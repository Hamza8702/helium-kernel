name: Build Helium Kernel (Miatoll)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev xz-utils crossbuild-essential-arm64 clang llvm lld

      - name: Compile Miatoll Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make O=out ARCH=arm64 cust_defconfig
          make -j$(nproc) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Helium-Kernel-Image
          path: out/arch/arm64/boot/Image.gz
